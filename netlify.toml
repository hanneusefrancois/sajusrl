# ══════════════════════════════════════════════════════════
#  NETLIFY CONFIGURATION — SAJU SRL
#  Sécurité, performance, SEO
# ══════════════════════════════════════════════════════════

[build]
  publish = "."          # Le dossier à publier (racine)
  command = ""           # Pas de build nécessaire, site statique

# ── Redirections ──────────────────────────────────────────
# Force www.saju.be (canonical)
[[redirects]]
  from   = "https://saju.be/*"
  to     = "https://www.saju.be/:splat"
  status = 301
  force  = true

# Fallback 404 → page principale
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers de sécurité (améliore le score SEO + sécurité) ──
[[headers]]
  for = "/*"

  [headers.values]
    # Sécurité
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

    # Performance : cache agressif pour les assets
    Cache-Control              = "public, max-age=3600, must-revalidate"

    # HTTPS strict
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"

    # Content Security Policy (autorise Calendly, Plausible, Google Fonts, Chart.js)
    Content-Security-Policy    = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://cdn.jsdelivr.net
        https://assets.calendly.com
        https://plausible.io
        https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline'
        https://fonts.googleapis.com
        https://assets.calendly.com
        https://cdnjs.cloudflare.com;
      font-src 'self'
        https://fonts.gstatic.com
        https://cdnjs.cloudflare.com;
      img-src 'self' data: https:;
      connect-src 'self'
        https://plausible.io
        https://calendly.com;
      frame-src https://calendly.com;
    """

# Cache long pour images et fonts
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
