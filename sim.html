<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://sim.saju.be/sim">
    <title>Redirection vers le simulateur Saju</title>
    <style>
        body {
            font-family: 'Inter', 'DM Sans', sans-serif;
            background: #0f1117;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: #171b24;
            border-radius: 12px;
            border: 1px solid rgba(201, 169, 78, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-family: 'Playfair Display', 'Cormorant Garamond', serif;
            color: #C9A94E;
            margin-bottom: 20px;
        }
        p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(201, 169, 78, 0.2);
            border-top: 3px solid #C9A94E;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #C9A94E;
            text-decoration: none;
            border-bottom: 1px solid rgba(201, 169, 78, 0.3);
            transition: border-color 0.2s;
        }
        a:hover {
            border-bottom-color: #C9A94E;
        }
    </style>
    <script>
        // Redirection immédiate avec fallback JavaScript
        window.location.href = "https://sim.saju.be/sim";
    </script>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Simulateur Saju</h1>
        <p>Redirection vers le simulateur en cours...</p>
        <p style="font-size: 0.9rem; opacity: 0.7;">
            Si la redirection ne fonctionne pas, 
            <a href="https://sim.saju.be/sim">cliquez ici</a>.
        </p>
    </div>
</body>
</html>
